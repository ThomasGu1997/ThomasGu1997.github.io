<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" width="1400" height="760" role="img" aria-label="Schematic of an expressway curve at night lined with glowing optoelectronic delineator posts guiding a vehicle">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a524" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#f5a524" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f5a524" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2140"/>
      <stop offset="100%" stop-color="#3a4266"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff7d6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff7d6" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="760" rx="18" fill="url(#sky)"/>
  <!-- stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="150" cy="90" r="3"/><circle cx="420" cy="60" r="2"/><circle cx="760" cy="110" r="2.5"/>
    <circle cx="1050" cy="70" r="2"/><circle cx="1280" cy="140" r="3"/><circle cx="930" cy="180" r="2"/>
  </g>
  <!-- expressway curve -->
  <path d="M-40 700 C 380 660 640 420 1440 330" fill="none" stroke="#454b63" stroke-width="150" stroke-linecap="round"/>
  <path d="M-40 700 C 380 660 640 420 1440 330" fill="none" stroke="#fbd75f" stroke-width="6" stroke-dasharray="46 40" opacity="0.9"/>
  <!-- delineator posts along outer edge -->
  <g>
    <g transform="translate(180,595)"><rect x="-5" y="0" width="10" height="54" rx="4" fill="#c7cbe0"/><circle cx="0" cy="-6" r="34" fill="url(#glow)"/><circle cx="0" cy="-6" r="9" fill="#ffd166"/></g>
    <g transform="translate(430,540)"><rect x="-5" y="0" width="10" height="50" rx="4" fill="#c7cbe0"/><circle cx="0" cy="-6" r="30" fill="url(#glow)"/><circle cx="0" cy="-6" r="8" fill="#ffd166"/></g>
    <g transform="translate(650,455)"><rect x="-4" y="0" width="9" height="46" rx="4" fill="#c7cbe0"/><circle cx="0" cy="-5" r="27" fill="url(#glow)"/><circle cx="0" cy="-5" r="7" fill="#ffd166"/></g>
    <g transform="translate(860,385)"><rect x="-4" y="0" width="8" height="42" rx="4" fill="#c7cbe0"/><circle cx="0" cy="-5" r="24" fill="url(#glow)"/><circle cx="0" cy="-5" r="6.5" fill="#ffd166"/></g>
    <g transform="translate(1070,330)"><rect x="-4" y="0" width="8" height="38" rx="4" fill="#c7cbe0"/><circle cx="0" cy="-4" r="21" fill="url(#glow)"/><circle cx="0" cy="-4" r="6" fill="#ffd166"/></g>
    <g transform="translate(1270,295)"><rect x="-3" y="0" width="7" height="34" rx="3" fill="#c7cbe0"/><circle cx="0" cy="-4" r="18" fill="url(#glow)"/><circle cx="0" cy="-4" r="5" fill="#ffd166"/></g>
  </g>
  <!-- car with headlight beam -->
  <g transform="translate(330,610) rotate(-9)">
    <path d="M60 8 L340 -34 L340 58 L60 30 Z" fill="url(#beam)"/>
    <rect x="-52" y="-14" width="112" height="46" rx="14" fill="#5b5bf0"/>
    <rect x="-34" y="-6" width="42" height="22" rx="7" fill="#c9d4ff"/>
    <circle cx="-34" cy="36" r="12" fill="#14172b" stroke="#c7cbe0" stroke-width="4"/>
    <circle cx="34" cy="36" r="12" fill="#14172b" stroke="#c7cbe0" stroke-width="4"/>
    <circle cx="56" cy="0" r="6" fill="#fff7d6"/>
  </g>
</svg>
