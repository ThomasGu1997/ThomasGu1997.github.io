<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" width="1400" height="760" role="img" aria-label="Schematic of a next-cycle conflict-risk field over a signalized network: a queue backs up past a stopline detector's sensing range, and risk cells concentrate on the road the detector cannot see">
  <rect width="1400" height="760" fill="#ffffff"/>
  <!-- road grid -->
  <g stroke="#e6e8f2" stroke-width="30" stroke-linecap="round">
    <line x1="90" y1="230" x2="1310" y2="230"/>
    <line x1="90" y1="530" x2="1310" y2="530"/>
    <line x1="350" y1="80" x2="350" y2="680"/>
    <line x1="700" y1="80" x2="700" y2="680"/>
    <line x1="1050" y1="80" x2="1050" y2="680"/>
  </g>
  <!-- risk field: cool cells across the network -->
  <g rx="10">
    <rect x="760" y="207" width="90" height="46" rx="10" fill="#5b5bf0" opacity="0.10"/>
    <rect x="890" y="207" width="90" height="46" rx="10" fill="#5b5bf0" opacity="0.07"/>
    <rect x="327" y="300" width="46" height="90" rx="10" fill="#5b5bf0" opacity="0.12"/>
    <rect x="677" y="90" width="46" height="90" rx="10" fill="#5b5bf0" opacity="0.11"/>
    <rect x="1027" y="330" width="46" height="90" rx="10" fill="#5b5bf0" opacity="0.09"/>
    <rect x="740" y="507" width="90" height="46" rx="10" fill="#5b5bf0" opacity="0.13"/>
    <rect x="900" y="507" width="90" height="46" rx="10" fill="#5b5bf0" opacity="0.08"/>
    <rect x="470" y="507" width="90" height="46" rx="10" fill="#5b5bf0" opacity="0.10"/>
    <rect x="1027" y="560" width="46" height="90" rx="10" fill="#f5c542" opacity="0.30"/>
  </g>
  <!-- risk field: hot cells at the unseen queue tail -->
  <g>
    <rect x="470" y="205" width="95" height="50" rx="10" fill="#f5c542" opacity="0.45"/>
    <rect x="370" y="205" width="95" height="50" rx="10" fill="#e0522d" opacity="0.50"/>
    <rect x="270" y="205" width="95" height="50" rx="10" fill="#e0522d" opacity="0.62"/>
  </g>
  <!-- stopline detector and its short sensing range -->
  <rect x="652" y="217" width="28" height="26" rx="5" fill="#0e97b8"/>
  <circle cx="666" cy="230" r="82" fill="none" stroke="#0e97b8" stroke-width="4" stroke-dasharray="10 12" opacity="0.55"/>
  <!-- signal head at the focal intersection -->
  <circle cx="726" cy="200" r="10" fill="#e0522d"/>
  <!-- queued vehicles backing up past the sensing range -->
  <g fill="#9aa3c0" stroke="#7a84a8" stroke-width="2">
    <rect x="606" y="219" width="38" height="22" rx="6"/>
    <rect x="556" y="219" width="38" height="22" rx="6"/>
    <rect x="506" y="219" width="38" height="22" rx="6"/>
    <rect x="456" y="219" width="38" height="22" rx="6"/>
    <rect x="406" y="219" width="38" height="22" rx="6"/>
    <rect x="356" y="219" width="38" height="22" rx="6"/>
    <rect x="306" y="219" width="38" height="22" rx="6"/>
  </g>
  <!-- free-flow vehicles elsewhere -->
  <g fill="#9aa3c0" stroke="#7a84a8" stroke-width="2" opacity="0.75">
    <rect x="860" y="519" width="38" height="22" rx="6"/>
    <rect x="1140" y="219" width="38" height="22" rx="6"/>
    <rect x="339" y="470" width="22" height="38" rx="6"/>
    <rect x="1039" y="150" width="22" height="38" rx="6"/>
  </g>
</svg>
