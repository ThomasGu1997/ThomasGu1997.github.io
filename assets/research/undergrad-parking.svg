<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" width="1400" height="760" role="img" aria-label="Schematic of a shared parking lot with occupied and free bays, a pricing tag, and a short-term availability forecast">
  <rect width="1400" height="760" fill="#ffffff"/>
  <!-- P sign -->
  <g transform="translate(80,70)">
    <rect width="150" height="150" rx="28" fill="#5b5bf0"/>
    <text x="75" y="112" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="bold" fill="#ffffff" text-anchor="middle">P</text>
  </g>
  <!-- parking rows -->
  <g stroke="#c7cbe0" stroke-width="5" fill="none">
    <path d="M320 120 h840 M320 120 v180 M460 120 v180 M600 120 v180 M740 120 v180 M880 120 v180 M1020 120 v180 M1160 120 v180"/>
    <path d="M320 460 h840 M320 460 v180 M460 460 v180 M600 460 v180 M740 460 v180 M880 460 v180 M1020 460 v180 M1160 460 v180"/>
  </g>
  <!-- occupied cars, top row -->
  <g>
    <rect x="345" y="150" width="90" height="130" rx="22" fill="#5b5bf0"/>
    <rect x="625" y="150" width="90" height="130" rx="22" fill="#0e97b8"/>
    <rect x="905" y="150" width="90" height="130" rx="22" fill="#8790a4"/>
  </g>
  <!-- occupied cars, bottom row -->
  <g>
    <rect x="485" y="490" width="90" height="130" rx="22" fill="#0e97b8"/>
    <rect x="1045" y="490" width="90" height="130" rx="22" fill="#5b5bf0" opacity="0.85"/>
  </g>
  <!-- free shared bays (dashed green) -->
  <g stroke="#2fa462" stroke-width="6" stroke-dasharray="14 12" fill="#eaf7ef">
    <rect x="485" y="150" width="90" height="130" rx="14"/>
    <rect x="765" y="150" width="90" height="130" rx="14"/>
    <rect x="345" y="490" width="90" height="130" rx="14"/>
    <rect x="905" y="490" width="90" height="130" rx="14"/>
  </g>
  <!-- price coin on a free shared bay -->
  <g transform="translate(810,215)">
    <circle r="46" fill="#f5c542" stroke="#d9a520" stroke-width="6"/>
    <circle r="26" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.9"/>
  </g>
  <!-- availability forecast card -->
  <g transform="translate(1180,430)">
    <rect x="0" y="0" width="190" height="230" rx="20" fill="#ffffff" stroke="#e6e8f2" stroke-width="4"/>
    <polyline points="26,180 62,150 96,160 130,110 164,84" fill="none" stroke="#0e97b8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#0e97b8"><circle cx="26" cy="180" r="9"/><circle cx="62" cy="150" r="9"/><circle cx="96" cy="160" r="9"/><circle cx="130" cy="110" r="9"/><circle cx="164" cy="84" r="9"/></g>
    <rect x="26" y="30" width="86" height="18" rx="9" fill="#e6e8f2"/>
    <rect x="26" y="58" width="56" height="14" rx="7" fill="#eef1fb"/>
  </g>
</svg>
